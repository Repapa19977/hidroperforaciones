app = "hidrocrm"
primary_region = "iad"

[build]

[env]
  NODE_ENV    = "production"
  PORT        = "3000"
  NODE_OPTIONS = "--max-old-space-size=400"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
